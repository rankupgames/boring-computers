name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  go:
    name: boringd (vet + build, amd64 + arm64)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boringd
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: boringd/go.mod
          cache-dependency-path: boringd/go.sum
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./...
      # The infra ships to x86_64 and arm64 hosts (and the Mac/Lima local path
      # is arm64) — keep both compiling.
      - run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build ./...
      - run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build ./...
      - name: Validate isolated worker profile
        run: |
          token_file="$(mktemp)"
          trap 'rm -f "$token_file"' EXIT
          printf 'ci-control-token' > "$token_file"
          chmod 0600 "$token_file"
          set -a
          source ../infra/rankup/isolated-worker.env
          set +a
          BORING_TOKEN_FILE="$token_file" go run . -check-config

  web:
    name: web + sdk (check, lint, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      # npm 11.14.1+ is required for the repository's min-release-age gate.
      - run: npm install --global npm@11.16.0
      - run: npm ci
      # The web workspace's vitest browser-mode project drives real chromium.
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - run: npm run lint
      - run: npm test -w boring-computers-sdk
      - run: npm test -w web
      - run: npm run build

  shell:
    name: infra scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Errors only — the scripts are heavy on intentional word-splitting and
      # ssh-heredoc patterns that trip stylistic levels.
      - run: bash -n infra/*.sh infra/latitude/*.sh infra/local/*.sh infra/rankup/*.sh
      - run: shellcheck -S error infra/*.sh infra/latitude/*.sh infra/local/*.sh infra/rankup/*.sh
      - name: Verify rootfs architecture mirrors
        run: |
          test "$(infra/rankup/build-unterm-builder-rootfs.sh --print-platform x86_64)" = $'x86_64-unknown-linux-gnu\thttp://archive.ubuntu.com/ubuntu'
          test "$(infra/rankup/build-unterm-builder-rootfs.sh --print-platform aarch64)" = $'aarch64-unknown-linux-gnu\thttp://ports.ubuntu.com/ubuntu-ports'
